name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  core-tests:
    outputs:
      report_ready: ${{ steps.report_check.outputs.report_ready }}
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: npm
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      env:
        AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
        USERNAME: ${{ secrets.USERNAME }}
        PASSWORD: ${{ secrets.PASSWORD }}
      run: npx playwright test --trace=retain-on-failure
    - name: Check Playwright report availability
      id: report_check
      if: ${{ always() && !cancelled() }}
      run: |
        if [ -f playwright-report/index.html ]; then
          echo "report_ready=true" >> "$GITHUB_OUTPUT"
        else
          echo "report_ready=false" >> "$GITHUB_OUTPUT"
        fi
    - uses: actions/upload-artifact@v4
      if: ${{ always() && !cancelled() && steps.report_check.outputs.report_ready == 'true' }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
    - name: Upload GitHub Pages artifact
      if: >-
        ${{
          always() &&
          !cancelled() &&
          github.event_name == 'push' &&
          (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
          steps.report_check.outputs.report_ready == 'true'
        }}
      uses: actions/upload-pages-artifact@v3
      with:
        path: playwright-report/
    - name: Add PR report link to job summary
      if: ${{ always() && !cancelled() && github.event_name == 'pull_request' && steps.report_check.outputs.report_ready == 'true' }}
      run: |
        {
          echo "### Playwright Report Artifact"
          echo ""
          echo "Download the \`playwright-report\` artifact from the [workflow run artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})."
        } >> "$GITHUB_STEP_SUMMARY"

  deploy-pages:
    needs: core-tests
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: true
    if: >-
      ${{
        always() &&
        github.event_name == 'push' &&
        (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
        needs.core-tests.result != 'cancelled' &&
        needs.core-tests.outputs.report_ready == 'true'
      }}
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
    - name: Add report link to job summary
      run: |
        {
          echo "### Playwright Report"
          echo ""
          echo "- [Open latest Playwright report](${{ steps.deployment.outputs.page_url }})"
        } >> "$GITHUB_STEP_SUMMARY"
